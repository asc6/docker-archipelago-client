name: Build on upstream Archipelago release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest Archipelago release tag
        id: get_release
        run: |
          TAG=$(curl -s https://api.github.com/repos/ArchipelagoMW/Archipelago/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get short commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Check if image tag already exists on GHCR
        id: check_tag
        run: |
          OWNER=${{ github.repository_owner }}
          IMAGE=docker-archipelago-client
          TAG=${{ steps.get_release.outputs.tag }}
          SHORT_SHA=${{ steps.sha.outputs.short }}
          COMMIT_TAG="$TAG-$SHORT_SHA"
          TOKEN=${{ secrets.GITHUB_TOKEN }}
          
          # Use GitHub API to check if the commit-specific tag exists
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/users/$OWNER/packages/container/$IMAGE/versions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" = "200" ]; then
            EXIST=$(echo "$BODY" | jq -r '.[] | select(.metadata.container.tags[]? == "'"$COMMIT_TAG"'") | .id' | head -n1)
            if [ -n "$EXIST" ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Tag $COMMIT_TAG already exists"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Tag $COMMIT_TAG is new, will build"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Could not verify tag status (HTTP $HTTP_CODE), proceeding with build"
          fi

      - name: Set build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image for new release
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/docker-archipelago-client:${{ steps.get_release.outputs.tag }}-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/docker-archipelago-client:${{ steps.get_release.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/docker-archipelago-client:latest
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.date }}
            VERSION=${{ steps.get_release.outputs.tag }}
            ARCHIPELAGO_RELEASE=${{ steps.get_release.outputs.tag }}
